services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pr_review
      POSTGRES_USER: pr_review
      POSTGRES_PASSWORD: pr_review
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pr_review"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
